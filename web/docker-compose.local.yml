# PaperQueue — web edition · LOCAL build.
# Builds the image from the source in this directory instead of pulling from
# Docker Hub. Use this for development or to run your own modified build.
#
#   docker compose -f docker-compose.local.yml up -d --build
#   → open http://localhost:5954
#
# Put your Zotero key in a `.env` file next to this one, or leave it blank to
# try the built-in demo library first.

services:
  paperqueue:
    build: .
    container_name: paperqueue
    restart: unless-stopped
    ports:
      - "5954:5954"
    volumes:
      - paperqueue-data:/data
    environment:
      ZOTERO_API_KEY: ${ZOTERO_API_KEY:-}
      PORT: "5954"
      DATA_DIR: /data
      # AI assistant (optional) — keys stay on the server, never sent to browsers.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AI_CUSTOM_NAME: ${AI_CUSTOM_NAME:-}
      AI_CUSTOM_BASE_URL: ${AI_CUSTOM_BASE_URL:-}
      AI_CUSTOM_API_KEY: ${AI_CUSTOM_API_KEY:-}

volumes:
  paperqueue-data:

name: Docker

# Builds the PaperQueue web-edition image for linux/amd64 and pushes it to
# Docker Hub (drakonis96/paperqueue) as both :latest and the version tag.
#
# Trigger by pushing a tag like `v1.10.0`, or run manually with a tag.
#
# Requires two repository secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username (drakonis96)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with read/write/delete

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.10.0)"
        required: true

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            drakonis96/paperqueue:latest
            drakonis96/paperqueue:${{ steps.v.outputs.version }}

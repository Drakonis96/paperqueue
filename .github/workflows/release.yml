name: Release

# Builds the unsigned iOS IPA and the macOS DMG on a macOS runner, publishes a
# GitHub Release with both artifacts, and patches the AltStore source on `main`
# with the real IPA size so the install link is immediately valid.
#
# Trigger by pushing a tag like `v1.2.0`, or run manually and pass the tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    # macos-15 ships Xcode 16, which the XcodeGen project format (objectVersion
    # 77) requires — macos-14's Xcode 15.4 can't open it.
    runs-on: macos-15
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # On a tag push this checks out the tag; on manual dispatch it checks out
      # the branch it was dispatched from (main). The release step then creates
      # the tag from this commit if it doesn't already exist.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then LATEST=/Applications/Xcode.app; fi
          echo "Using $LATEST"
          sudo xcode-select -switch "$LATEST"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: app
        run: xcodegen generate

      - name: Build unsigned iOS IPA
        working-directory: app
        run: |
          set -euo pipefail
          xcodebuild \
            -project PaperQueue.xcodeproj \
            -scheme PaperQueue \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/PaperQueue-iOS.xcarchive" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            archive
          mkdir -p build/Payload
          cp -R build/PaperQueue-iOS.xcarchive/Products/Applications/PaperQueue.app build/Payload/
          (cd build && zip -qry PaperQueue-unsigned.ipa Payload)

      - name: Build macOS app and DMG
        working-directory: app
        run: |
          set -euo pipefail
          xcodebuild \
            -project PaperQueue.xcodeproj \
            -scheme PaperQueue \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$PWD/build/PaperQueue-macOS.xcarchive" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            archive
          APP="build/PaperQueue-macOS.xcarchive/Products/Applications/PaperQueue.app"
          # Ad-hoc sign so macOS lets the user right-click → Open without Gatekeeper
          # rejecting a completely unsigned bundle.
          codesign --force --deep --sign - "$APP"
          mkdir -p build/dmg
          cp -R "$APP" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "PaperQueue" -srcfolder build/dmg \
            -ov -format UDZO build/PaperQueue.dmg

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "PaperQueue ${{ steps.tag.outputs.version }}" \
            --notes "Automated release. See AltStore source for the changelog." \
            --target "${{ github.sha }}" \
            app/build/PaperQueue-unsigned.ipa \
            app/build/PaperQueue.dmg \
          || gh release upload "$TAG" \
            app/build/PaperQueue-unsigned.ipa \
            app/build/PaperQueue.dmg --clobber

      - name: Patch AltStore source with real IPA size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          SIZE=$(stat -f%z app/build/PaperQueue-unsigned.ipa)
          git fetch origin main
          git checkout main
          jq --arg v "$VERSION" --argjson size "$SIZE" '
            .apps[0].versions |= map(
              if .version == $v then .size = $size else . end
            )
          ' altstore-source.json > altstore-source.tmp
          mv altstore-source.tmp altstore-source.json
          if git diff --quiet altstore-source.json; then
            echo "AltStore size already correct."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add altstore-source.json
            git commit -m "Update AltStore IPA size for v$VERSION"
            git push origin main
          fi
